name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver tag to release (e.g. v0.1.0). Defaults to the pushed tag.'
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  ORG: hesper-labs

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_prerelease: ${{ steps.v.outputs.is_prerelease }}
    steps:
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF##*/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+-'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  gateway-binaries:
    name: Build gateway binaries
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: Build
        working-directory: gateway
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          mkdir -p dist
          OUT="dist/leakshield-${VERSION}-${GOOS}-${GOARCH}"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "${OUT}" ./cmd/leakshield
          (cd dist && tar -czf "leakshield-${VERSION}-${GOOS}-${GOARCH}.tar.gz" "$(basename "${OUT}")")
          (cd dist && shasum -a 256 "leakshield-${VERSION}-${GOOS}-${GOARCH}.tar.gz" \
            > "leakshield-${VERSION}-${GOOS}-${GOARCH}.tar.gz.sha256")

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: gateway-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            gateway/dist/*.tar.gz
            gateway/dist/*.sha256

  images:
    name: Build & push image (${{ matrix.component }})
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: gateway
            context: gateway
          - component: inspector
            context: inspector
          - component: panel
            context: panel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: img
        shell: bash
        run: |
          NAME="${{ env.REGISTRY }}/${{ env.ORG }}/leakshield-${{ matrix.component }}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: tags
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          IS_PRERELEASE: ${{ needs.resolve.outputs.is_prerelease }}
          NAME: ${{ steps.img.outputs.name }}
        run: |
          TAGS="${NAME}:${VERSION}"
          if [ "${IS_PRERELEASE}" = "false" ]; then
            TAGS="${TAGS}\n${NAME}:latest"
          fi
          {
            echo 'tags<<EOF'
            printf '%b\n' "${TAGS}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.source=https://github.com/Hesper-Labs/leakshield
            org.opencontainers.image.version=${{ needs.resolve.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.img.outputs.name }}:${{ needs.resolve.outputs.version }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.component }}-${{ needs.resolve.outputs.version }}.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        # TODO: pin cosign key — currently keyless via OIDC. For air-gapped or
        # dual-signing setups, generate a long-lived key pair, store the private
        # half in GitHub secrets as COSIGN_KEY, and pass `--key env://COSIGN_KEY`
        # to `cosign sign` below.

      - name: Cosign keyless sign
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE_REF: ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_REF}"

  release:
    name: Publish GitHub Release
    needs: [resolve, gateway-binaries, images]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download gateway binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: gateway-*
          merge-multiple: true

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          PREV=$(git describe --tags --abbrev=0 --exclude="${VERSION}" 2>/dev/null || true)
          {
            echo "## What changed"
            echo
            if [ -n "${PREV}" ]; then
              git log --pretty=format:'- %s (%h)' "${PREV}..${VERSION}" 2>/dev/null \
                || git log --pretty=format:'- %s (%h)' -n 50
            else
              git log --pretty=format:'- %s (%h)' -n 50
            fi
            echo
            echo
            echo "## Container images"
            echo
            echo "Pull images from GHCR:"
            echo
            echo '```'
            echo "docker pull ${{ env.REGISTRY }}/${{ env.ORG }}/leakshield-gateway:${VERSION}"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.ORG }}/leakshield-inspector:${VERSION}"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.ORG }}/leakshield-panel:${VERSION}"
            echo '```'
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.version }}
          name: ${{ needs.resolve.outputs.version }}
          body_path: release-notes.md
          prerelease: ${{ needs.resolve.outputs.is_prerelease == 'true' }}
          files: dist/*
