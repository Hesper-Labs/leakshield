<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600" role="img" aria-label="LeakShield banner: API Gateway. Secret Guard. Built for Safety.">
  <title>LeakShield</title>
  <desc>LeakShield brand banner. A shield with a keyhole on the left, the project slogan in navy, and four labeled flow arrows on the right showing client traffic routed through the gateway to OpenAI, Anthropic, Google, and Azure with allow/deny indicators.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="1"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="600" fill="url(#bg)"/>

  <!-- ==========================================================
       LEFT: brand mark + slogan
       ========================================================== -->

  <!-- Three flow lines entering the shield -->
  <g stroke="url(#flow)" stroke-width="8" stroke-linecap="round" fill="none">
    <path d="M40 220 H148"/>
    <path d="M40 280 H148"/>
    <path d="M40 340 H148"/>
  </g>

  <!-- Shield -->
  <g transform="translate(140 140)">
    <path d="M120 0
             L240 48
             V160
             C240 240 180 296 120 320
             C60 296 0 240 0 160
             V48
             Z"
          fill="url(#shield)"
          stroke="#0f172a"
          stroke-width="10"
          stroke-linejoin="round"/>
    <!-- Keyhole -->
    <circle cx="120" cy="140" r="26" fill="#3b82f6"/>
    <path d="M110 154 L130 154 L138 220 L102 220 Z" fill="#3b82f6"/>
  </g>

  <!-- Slogan -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" fill="#0f172a">
    <text x="40" y="490" font-size="56" font-weight="700">API Gateway. Secret Guard.</text>
    <text x="40" y="552" font-size="56" font-weight="700">Built for Safety.</text>
  </g>

  <!-- ==========================================================
       RIGHT: flow diagram (client → gateway → providers)
       ========================================================== -->

  <!-- Client box -->
  <g transform="translate(660 240)">
    <rect width="160" height="120" rx="14" ry="14"
          fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
    <text x="80" y="56" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
          font-size="22" font-weight="600" fill="#0f172a">Client</text>
    <text x="80" y="86" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
          font-size="16" fill="#475569">SDK / CLI</text>
  </g>

  <!-- Arrow client → gateway -->
  <path d="M825 300 H905"
        stroke="#3b82f6" stroke-width="6" fill="none"
        marker-end="url(#arrow)"/>

  <!-- Gateway shield (smaller copy) -->
  <g transform="translate(910 220)">
    <path d="M80 0
             L160 32
             V108
             C160 160 122 196 80 216
             C38 196 0 160 0 108
             V32
             Z"
          fill="#0f172a"
          stroke="#0f172a"
          stroke-width="4"
          stroke-linejoin="round"/>
    <!-- Inner stroke for contrast -->
    <path d="M80 14
             L146 40
             V108
             C146 152 116 184 80 200
             C44 184 14 152 14 108
             V40
             Z"
          fill="none"
          stroke="#3b82f6"
          stroke-opacity="0.6"
          stroke-width="2"
          stroke-linejoin="round"/>
    <!-- Keyhole, white -->
    <circle cx="80" cy="100" r="16" fill="#ffffff"/>
    <path d="M73 112 L87 112 L92 152 L68 152 Z" fill="#ffffff"/>
    <text x="80" y="248" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif"
          font-size="20" font-weight="700" fill="#0f172a">LeakShield</text>
  </g>

  <!-- Allow / Deny indicators next to the gateway -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="16" font-weight="600">
    <!-- ALLOW pill -->
    <g transform="translate(1090 218)">
      <rect width="84" height="32" rx="16" ry="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <circle cx="18" cy="16" r="6" fill="#16a34a"/>
      <text x="34" y="22" fill="#166534">allow</text>
    </g>
    <!-- DENY pill -->
    <g transform="translate(1090 268)">
      <rect width="84" height="32" rx="16" ry="16" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <circle cx="18" cy="16" r="6" fill="#dc2626"/>
      <text x="34" y="22" fill="#991b1b">deny</text>
    </g>
  </g>

  <!-- Arrow gateway → providers (single trunk) -->
  <path d="M1190 300 H1260"
        stroke="#3b82f6" stroke-width="6" fill="none"
        marker-end="url(#arrow)"/>

  <!-- Provider list (four labels stacked) -->
  <g transform="translate(1268 178)" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="600">
    <!-- OpenAI -->
    <g transform="translate(0 0)">
      <rect width="280" height="48" rx="10" ry="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="22" cy="24" r="6" fill="#10b981"/>
      <text x="44" y="32" fill="#0f172a">OpenAI</text>
    </g>
    <!-- Anthropic -->
    <g transform="translate(0 64)">
      <rect width="280" height="48" rx="10" ry="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="22" cy="24" r="6" fill="#f59e0b"/>
      <text x="44" y="32" fill="#0f172a">Anthropic</text>
    </g>
    <!-- Google -->
    <g transform="translate(0 128)">
      <rect width="280" height="48" rx="10" ry="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="22" cy="24" r="6" fill="#3b82f6"/>
      <text x="44" y="32" fill="#0f172a">Google Gemini</text>
    </g>
    <!-- Azure -->
    <g transform="translate(0 192)">
      <rect width="280" height="48" rx="10" ry="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
      <circle cx="22" cy="24" r="6" fill="#0ea5e9"/>
      <text x="44" y="32" fill="#0f172a">Azure OpenAI</text>
    </g>
  </g>

  <!-- Faint connector lines from the trunk to each provider box -->
  <g stroke="#3b82f6" stroke-width="3" fill="none" stroke-opacity="0.55">
    <path d="M1260 300 L1268 202"/>
    <path d="M1260 300 L1268 266"/>
    <path d="M1260 300 L1268 330"/>
    <path d="M1260 300 L1268 394"/>
  </g>
</svg>
