{{- /*
A single Secret holds:
  - kek: 32 random bytes used as the key-encryption-key (only when
    kek.provider=local and kek.secretName is unset)
  - jwt-secret: panel <-> gateway session signing
  - postgres-password: bundled Postgres password (when postgres.enabled and
    no existingSecret is named)

If `kek.secretName` is set, the chart trusts the user to manage the Secret
externally (Vault Agent injector, External Secrets Operator, etc.).
*/ -}}
{{- if not .Values.kek.secretName }}
{{- $secretName := printf "%s-secrets" (include "leakshield.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leakshield.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if eq .Values.kek.provider "local" }}
  kek: {{ if $existing }}{{ index $existing.data "kek" | default (randAlphaNum 32 | b64enc) }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
  {{- end }}
  jwt-secret: {{ if .Values.auth.jwtSecret }}{{ .Values.auth.jwtSecret | b64enc }}{{ else if and $existing (index $existing.data "jwt-secret") }}{{ index $existing.data "jwt-secret" }}{{ else }}{{ randAlphaNum 64 | b64enc }}{{ end }}
  {{- if and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
  postgres-password: {{ if .Values.postgres.auth.password }}{{ .Values.postgres.auth.password | b64enc }}{{ else if and $existing (index $existing.data "postgres-password") }}{{ index $existing.data "postgres-password" }}{{ else }}{{ randAlphaNum 32 | b64enc }}{{ end }}
  {{- end }}
{{- end }}
