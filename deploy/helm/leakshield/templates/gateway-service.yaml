apiVersion: v1
kind: Service
metadata:
  name: {{ include "leakshield.componentName" (list . "gateway") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leakshield.componentLabels" (list . "gateway") | nindent 4 }}
  {{- if and .Values.observability.prometheus.enabled (not .Values.observability.prometheus.serviceMonitor.enabled) }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.gateway.service.port | quote }}
    prometheus.io/path: "/metrics"
  {{- end }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "leakshield.componentSelectorLabels" (list . "gateway") | nindent 4 }}
