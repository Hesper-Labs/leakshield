name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gateway:
    name: Gateway (Go)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.23']
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-coverage-${{ matrix.os }}-go${{ matrix.go }}
          path: gateway/coverage.out
          if-no-files-found: ignore

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  inspector:
    name: Inspector (Python)
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12']
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inspector
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff
        run: ruff check src tests

      - name: Mypy (only if mypy.ini exists)
        run: |
          if [ -f mypy.ini ]; then
            pip install mypy
            mypy src
          else
            echo "mypy.ini not found; skipping"
          fi

      - name: Pytest
        run: pytest -q --cov=leakshield_inspector

      - name: pip-audit
        run: pip-audit

  panel:
    name: Panel (Node)
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: panel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: panel/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: panel/.next/cache
          key: nextjs-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('panel/package-lock.json') }}-${{ hashFiles('panel/**/*.[jt]s', 'panel/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('panel/package-lock.json') }}-
            nextjs-${{ runner.os }}-node${{ matrix.node }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
