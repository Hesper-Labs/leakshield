apiVersion: v1
kind: Service
metadata:
  name: {{ include "leakshield.componentName" (list . "panel") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "leakshield.componentLabels" (list . "panel") | nindent 4 }}
spec:
  type: {{ .Values.panel.service.type }}
  ports:
    - name: http
      port: {{ .Values.panel.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "leakshield.componentSelectorLabels" (list . "panel") | nindent 4 }}
